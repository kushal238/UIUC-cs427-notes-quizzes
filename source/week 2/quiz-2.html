<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Engineering Quiz — Module 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e2e2de;
  --text: #1a1a18;
  --muted: #6b6b67;
  --accent: #2563eb;
  --correct-bg: #dcfce7;
  --correct-border: #16a34a;
  --correct-text: #14532d;
  --wrong-bg: #fee2e2;
  --wrong-border: #dc2626;
  --wrong-text: #7f1d1d;
  --reveal-bg: #dbeafe;
  --reveal-border: #2563eb;
  --reveal-text: #1e3a8a;
  --expl-bg: #f3f4f6;
  --radius: 6px;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 16px 60px;
}

.container { max-width: 720px; margin: 0 auto; }

header { margin-bottom: 32px; }
header h1 {
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}
header p {
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}

/* Tabs */
.tabs {
  display: flex;
  align-items: center;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
  gap: 0;
}
.tab-btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 10px 18px;
  border: none;
  background: none;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
.tab-btn:hover:not(.active) { color: var(--text); }

.tab-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  padding-bottom: 2px;
}

.action-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  padding: 4px 11px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--text); color: var(--text); }

/* Tab panels */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Score bar */
.score-bar {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.score-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-weight: 500;
  color: var(--text);
}

/* Question card */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.q-card:hover { border-color: #c8c8c4; }

.q-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.q-text {
  font-size: 0.93rem;
  font-weight: 500;
  line-height: 1.55;
  margin-bottom: 16px;
  color: var(--text);
}

/* Options */
.options { display: flex; flex-direction: column; gap: 7px; }

.opt {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.87rem;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.45;
  width: 100%;
}
.opt:hover:not([disabled]) {
  border-color: var(--accent);
  background: #eff6ff;
}
.opt[disabled] { cursor: default; }

/* Answer state classes — full replacement, !important to override everything */
.opt-correct {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.87rem;
  padding: 10px 14px;
  border-radius: var(--radius);
  text-align: left;
  line-height: 1.45;
  cursor: default;
  width: 100%;
  border: 1.5px solid var(--correct-border) !important;
  background: var(--correct-bg) !important;
  color: var(--correct-text) !important;
  font-weight: 500;
}
.opt-wrong {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.87rem;
  padding: 10px 14px;
  border-radius: var(--radius);
  text-align: left;
  line-height: 1.45;
  cursor: default;
  width: 100%;
  border: 1.5px solid var(--wrong-border) !important;
  background: var(--wrong-bg) !important;
  color: var(--wrong-text) !important;
}
.opt-reveal {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.87rem;
  padding: 10px 14px;
  border-radius: var(--radius);
  text-align: left;
  line-height: 1.45;
  cursor: default;
  width: 100%;
  border: 1.5px solid var(--reveal-border) !important;
  background: var(--reveal-bg) !important;
  color: var(--reveal-text) !important;
}
.opt-neutral {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.87rem;
  padding: 10px 14px;
  border-radius: var(--radius);
  text-align: left;
  line-height: 1.45;
  cursor: default;
  width: 100%;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--muted);
}

/* Explanation */
.explanation {
  display: none;
  margin-top: 12px;
  background: var(--expl-bg);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 0.83rem;
  color: var(--text);
  line-height: 1.6;
}
.explanation.show { display: block; }

.expl-title {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: 'IBM Plex Mono', monospace;
}
.expl-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.expl-list li {
  padding: 5px 0;
  border-bottom: 1px solid #e5e5e2;
  font-size: 0.83rem;
  line-height: 1.55;
}
.expl-list li:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Software Engineering — Quiz</h1>
    <p>Module 2 · Development Models &amp; Project Management</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('coursera', this)">Coursera 原题</button>
    <div class="tab-actions">
      <button class="action-btn" onclick="revealAll()">Reveal All</button>
      <button class="action-btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="tab-coursera" class="tab-panel active">
    <div class="score-bar">
      Score: <span class="score-pill" id="score-display">— / 15</span>
    </div>
    <div id="questions-container"></div>
  </div>
</div>

<script>
const questions = [
  {
    num: 1,
    text: "Which of the following is a situation under which using a waterfall model may be undesirable?",
    options: [
      "Frequently changing requirements",
      "Mission-critical use case",
      "Customer with clear objective",
      "Large development team"
    ],
    correct: 0,
    explanations: [
      "✅ Frequently changing requirements — Waterfall is linear and does not accommodate changes well once a phase is complete. Frequent requirement changes make it undesirable.",
      "❌ Mission-critical use case — Waterfall is actually well-suited for mission-critical systems where rigorous documentation and sequential validation are required.",
      "❌ Customer with clear objective — Clear, stable objectives are ideal for Waterfall, since requirements won't change mid-process.",
      "❌ Large development team — Waterfall's structured, document-driven phases help coordinate large teams, making it a suitable choice."
    ]
  },
  {
    num: 2,
    text: "The Elaboration stage in the Rational Unified Process includes which of the following activities:",
    options: [
      "Implement further improvement from initial version",
      "Implement initial version",
      "Determining features",
      "Testing/using the software"
    ],
    correct: 1,
    explanations: [
      "❌ Implement further improvement from initial version — This describes the Construction phase, which iterates and improves upon the initial version produced in Elaboration.",
      "✅ Implement initial version — Elaboration produces the initial architectural baseline, i.e., the first working version of the system.",
      "❌ Determining features — This belongs to the Inception phase, where scope and high-level requirements are established.",
      "❌ Testing/using the software — This corresponds to the Transition phase, where the product is deployed and validated with users."
    ]
  },
  {
    num: 3,
    text: "A team of 6 developers have been assigned to develop a web application to monitor statuses of the used 3rd party services (whose requirements can be updated frequently and which are not mission/financial/safety-critical ones). Which of the following software development models best suits the purpose?",
    options: [
      "Waterfall Model",
      "Spiral Model",
      "Scrum Model",
      "Chaos Model"
    ],
    correct: 2,
    explanations: [
      "❌ Waterfall Model — Waterfall is poorly suited for frequently changing requirements; it cannot adapt once phases are completed.",
      "❌ Spiral Model — Spiral is designed for high-risk, large-scale projects. This project is non-critical and small-team, making Spiral's overhead unnecessary.",
      "✅ Scrum Model — Scrum handles frequently changing requirements via sprints, suits small teams, and is ideal for non-critical web applications.",
      "❌ Chaos Model — Not a recognized, structured software development methodology."
    ]
  },
  {
    num: 4,
    text: "Extreme Programming (XP) has which of the following advantages?",
    options: [
      "Comprehensive documentation is prepared throughout the process.",
      "The customers are closely engaged throughout the process, not just only the beginning.",
      "All features are released at once",
      "The resulting software has high fault tolerance."
    ],
    correct: 1,
    explanations: [
      "❌ Comprehensive documentation is prepared throughout the process. — XP prioritizes working software over comprehensive documentation. This describes plan-driven approaches like Waterfall.",
      "✅ The customers are closely engaged throughout the process, not just only the beginning. — Continuous customer involvement is a defining advantage of XP; customers participate in planning, feedback, and priority setting throughout.",
      "❌ All features are released at once — XP delivers software incrementally through short iterations, not all at once.",
      "❌ The resulting software has high fault tolerance. — Fault tolerance is a system design attribute, not a direct outcome of using XP."
    ]
  },
  {
    num: 5,
    text: "Scrum Process does not include which of the following activities?",
    options: [
      "Daily Scrum Meeting",
      "Quarterly Team Reflection",
      "Prioritizing Product-Backlog Tasks",
      "Delivering Product Increment After a Sprint"
    ],
    correct: 1,
    explanations: [
      "❌ Daily Scrum Meeting — This IS a core Scrum ceremony (the daily standup), held every day during a sprint.",
      "✅ Quarterly Team Reflection — This is NOT a Scrum activity. The Scrum retrospective occurs at the end of each sprint, not quarterly.",
      "❌ Prioritizing Product-Backlog Tasks — Backlog refinement and prioritization is a standard Scrum activity performed by the Product Owner.",
      "❌ Delivering Product Increment After a Sprint — Delivering a potentially shippable product increment at the end of each sprint is a fundamental Scrum outcome."
    ]
  },
  {
    num: 6,
    text: "Which of the following projects prefers plan-driven methodology over agile methodology?",
    options: [
      "Chatting-room website",
      "Video-game simulator",
      "Phone calculator",
      "Software for rockets"
    ],
    correct: 3,
    explanations: [
      "❌ Chatting-room website — A consumer web application with evolving features is well-suited for Agile, not plan-driven.",
      "❌ Video-game simulator — Game development typically benefits from iterative, Agile approaches to refine gameplay and features.",
      "❌ Phone calculator — A simple, small-scope app; Agile or even a single-developer approach would suffice.",
      "✅ Software for rockets — Safety-critical, mission-critical systems require rigorous documentation, traceability, and sequential validation — hallmarks of plan-driven (Waterfall) methodology."
    ]
  },
  {
    num: 7,
    text: "Which of the following situation belongs to risks in software development? Choose the single best answer.",
    options: [
      "Late delivery",
      "Wrong feature requirement",
      "Team dissolution",
      "All of above"
    ],
    correct: 3,
    explanations: [
      "❌ Late delivery — This is a schedule risk and is indeed a software development risk, but selecting only this is incomplete.",
      "❌ Wrong feature requirement — This is a requirements risk and is indeed a software development risk, but selecting only this is incomplete.",
      "❌ Team dissolution — This is a people/resource risk and is indeed a software development risk, but selecting only this is incomplete.",
      "✅ All of above — All three — late delivery (schedule), wrong requirements (requirements), and team dissolution (people) — are recognized categories of software development risk."
    ]
  },
  {
    num: 8,
    text: "For the above Gantt chart, which of the following statements is wrong?\n\nTask 1: Day 1–Day 2 | Task 2: Day 1.5–Day 3 | Task 3: Day 3–Day 5 | Task 4: Day 2–Day 4",
    options: [
      "The relationship between tasks 1 and 2 satisfies the Start-To-Start constraint",
      "The relationship between tasks 2 and 3 satisfies the Finish-To-Start constraint",
      "The relationship between tasks 3 and 4 satisfies the Finish-To-Finish constraint",
      "The relationship between tasks 1 and 4 satisfies the Finish-To-Start constraint"
    ],
    correct: 3,
    explanations: [
      "❌ The relationship between tasks 1 and 2 satisfies the Start-To-Start constraint — TRUE: Task 1 starts at Day 1, Task 2 starts at Day 1.5. Task 2 can only start after Task 1 starts → Start-to-Start. This statement is correct.",
      "❌ The relationship between tasks 2 and 3 satisfies the Finish-To-Start constraint — TRUE: Task 2 ends at Day 3, Task 3 starts at Day 3. Task 3 begins right after Task 2 finishes → Finish-to-Start. This statement is correct.",
      "❌ The relationship between tasks 3 and 4 satisfies the Finish-To-Finish constraint — TRUE: Task 3 ends at Day 5, Task 4 ends at Day 4. Task 4 must finish before/when Task 3 finishes → Finish-to-Finish. This statement is correct.",
      "✅ The relationship between tasks 1 and 4 satisfies the Finish-To-Start constraint — WRONG: Task 1 ends at Day 2, Task 4 starts at Day 2 — they overlap in start/end. More accurately this is Finish-to-Start, but looking at the chart, Task 4 starts at Day 2 which is when Task 1 ends, not after. The constraint does not hold as a clean FS relationship — this is the incorrect statement."
    ]
  },
  {
    num: 9,
    text: "For the above PERT chart, which of the following is the correct critical path sequence?\n\nA→B: 6, B→C: 3, B→D: 10, C→E: 7, D→E: 5",
    options: [
      "B→C→E",
      "B→D→E",
      "A→B→C→E",
      "A→B→D→E"
    ],
    correct: 3,
    explanations: [
      "❌ B→C→E — Incomplete path (missing A) and total = 3+7 = 10. Not the longest path.",
      "❌ B→D→E — Incomplete path (missing A) and total = 10+5 = 15. Not a complete path from start.",
      "❌ A→B→C→E — Complete path, total = 6+3+7 = 16. Not the longest.",
      "✅ A→B→D→E — Complete path, total = 6+10+5 = 21. This is the longest path and therefore the critical path. Any delay on this path delays the entire project."
    ]
  },
  {
    num: 10,
    text: "In a PERT chart, which of the following statements is correct?",
    options: [
      "An arrow edge between two events indicates the data flow across the two events",
      "The label on the arrow edge represents the importance of the event",
      "The graph for the PERT chart is a directed acyclic graph",
      "Events on the critical paths have slack time"
    ],
    correct: 2,
    explanations: [
      "❌ An arrow edge between two events indicates the data flow across the two events — Incorrect. Arrow edges in a PERT chart represent task dependencies and durations, not data flow.",
      "❌ The label on the arrow edge represents the importance of the event — Incorrect. The label represents the duration (time) of the task, not its importance.",
      "✅ The graph for the PERT chart is a directed acyclic graph — Correct. PERT charts are DAGs: directed (dependencies have direction) and acyclic (no circular dependencies are allowed in scheduling).",
      "❌ Events on the critical paths have slack time — Incorrect. Events on the critical path have zero slack time. Slack time only exists on non-critical paths."
    ]
  },
  {
    num: 11,
    text: "For a software project, a freelance developer, Jane, stores all her source code and digital assets, which she values at $50,000, on a single hard drive. The hard drive has a failure probability of around 2%. What is the risk exposure to a drive failure for the software project?",
    options: [
      "$50,000",
      "$1,000",
      "$49,000",
      "$2"
    ],
    correct: 1,
    explanations: [
      "❌ $50,000 — This is the total asset value, not the risk exposure. Risk exposure accounts for probability.",
      "✅ $1,000 — Correct. Risk Exposure = Probability × Loss = 2% × $50,000 = $1,000.",
      "❌ $49,000 — This is $50,000 − $1,000, which has no standard formula basis in risk exposure calculation.",
      "❌ $2 — This appears to confuse percentage value with dollar amount; not a valid calculation."
    ]
  },
  {
    num: 12,
    text: "The preceding freelance developer, Jane, decides to purchase an off-site backup plan. What type of risk mitigation strategy is she using?",
    options: [
      "Risk avoidance",
      "Risk protection",
      "Risk acceptance",
      "Risk monitoring"
    ],
    correct: 1,
    explanations: [
      "❌ Risk avoidance — Avoidance means eliminating the risk source entirely (e.g., not storing data digitally). Jane still uses the hard drive, so she is not avoiding the risk.",
      "✅ Risk protection — Protection means taking proactive steps to reduce the impact or likelihood of a risk. Purchasing an off-site backup reduces the impact of a hard drive failure.",
      "❌ Risk acceptance — Acceptance means acknowledging the risk and doing nothing. Jane is actively taking a countermeasure.",
      "❌ Risk monitoring — Monitoring means tracking risk indicators over time to detect if the risk materializes, without proactive mitigation."
    ]
  },
  {
    num: 13,
    text: "Which of the following is not a XP practice?",
    options: [
      "Test-driven development",
      "Planning game",
      "Pair programming",
      "Sequential design"
    ],
    correct: 3,
    explanations: [
      "❌ Test-driven development — TDD is a core XP practice: write tests before writing implementation code.",
      "❌ Planning game — The Planning Game is a standard XP practice where developers and customers collaboratively plan iterations.",
      "❌ Pair programming — Pair programming (two developers sharing one machine) is one of XP's most iconic practices.",
      "✅ Sequential design — This is NOT an XP practice. Sequential design (designing everything upfront before coding) is characteristic of Waterfall, not XP. XP uses emergent, incremental design."
    ]
  },
  {
    num: 14,
    text: "A team of software engineers decide to use Agile methodology for their new software project. Which of the following is not a justifying reason for their choice?",
    options: [
      "The customers are constantly anticipating new features for the software to be developed",
      "As a start-up company, the development team is rather small",
      "In a recently conducted questionnaire, the software engineers in the team commonly indicate that they prefer an ordered culture",
      "Majority of the software engineers in the team are having high skill levels, being hired from top software companies in recent years."
    ],
    correct: 2,
    explanations: [
      "❌ The customers are constantly anticipating new features for the software to be developed — This IS a justifying reason. Agile handles evolving requirements well through iterative delivery.",
      "❌ As a start-up company, the development team is rather small — This IS a justifying reason. Agile suits small, self-organizing teams better than heavyweight plan-driven processes.",
      "✅ In a recently conducted questionnaire, the software engineers in the team commonly indicate that they prefer an ordered culture — This is NOT a justifying reason for Agile. A preference for ordered, structured culture indicates affinity for plan-driven methods, not Agile.",
      "❌ Majority of the software engineers in the team are having high skill levels — This IS a justifying reason. Agile relies on skilled, self-directed engineers who can handle ambiguity and make design decisions independently."
    ]
  },
  {
    num: 15,
    text: "A software system contains two components. Between the following two practices, which one will usually cost fewer man-hours to produce the two components?",
    options: [
      "Two developers working in parallel",
      "Two developers engaging in pair-programming developing the components sequentially"
    ],
    correct: 0,
    explanations: [
      "✅ Two developers working in parallel — Each developer works on one component simultaneously. Total man-hours = time for one component × 2 developers, but elapsed time is halved. The total effort spent is lower than pair programming on sequential tasks.",
      "❌ Two developers engaging in pair-programming developing the components sequentially — Both developers work on Component 1 together, then Component 2. This doubles the man-hours per component (2 people × time per component × 2 components), resulting in higher total man-hours despite potential quality benefits."
    ]
  }
];

// State per question
let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `qcard-${idx}`;

    const optionsHTML = q.options.map((opt, oi) =>
      `<button class="opt" id="opt-${idx}-${oi}" onclick="selectOption(${idx}, ${oi})">${opt}</button>`
    ).join('');

    const explItems = q.explanations.map(e => `<li>${e}</li>`).join('');

    card.innerHTML = `
      <div class="q-num">Q${q.num}</div>
      <div class="q-text">${q.text.replace(/\n/g, '<br>')}</div>
      <div class="options" id="opts-${idx}">${optionsHTML}</div>
      <div class="explanation" id="expl-${idx}">
        <div class="expl-title">Explanation</div>
        <ul class="expl-list">${explItems}</ul>
      </div>
    `;
    container.appendChild(card);
  });

  updateScore();
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;

  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;
  if (isCorrect) correctCount++;

  q.options.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${qIdx}-${oi}`);
    btn.disabled = true;
    if (oi === optIdx && isCorrect) {
      btn.className = 'opt-correct';
    } else if (oi === optIdx && !isCorrect) {
      btn.className = 'opt-wrong';
    } else if (oi === q.correct && !isCorrect) {
      btn.className = 'opt-reveal';
    } else {
      btn.className = 'opt-neutral';
    }
  });

  document.getElementById(`expl-${qIdx}`).classList.add('show');
  updateScore();
}

function revealAll() {
  questions.forEach((q, idx) => {
    if (answered[idx]) return;
    answered[idx] = true;
    // Not counted as correct since user didn't answer

    q.options.forEach((_, oi) => {
      const btn = document.getElementById(`opt-${idx}-${oi}`);
      btn.disabled = true;
      btn.className = oi === q.correct ? 'opt-reveal' : 'opt-neutral';
    });

    document.getElementById(`expl-${idx}`).classList.add('show');
  });

  updateScore();
}

function resetAll() {
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  buildQuestions();
}

function updateScore() {
  const total = answered.filter(Boolean).length;
  const display = total === 0 ? '— / 15' : `${correctCount} / ${total} answered`;
  document.getElementById('score-display').textContent = display;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

buildQuestions();
</script>
</body>
</html>
