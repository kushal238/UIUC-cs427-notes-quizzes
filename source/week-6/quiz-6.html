
<style>
:root {
  --correct-bg: #dcfce7; --correct-border: #16a34a; --correct-text: #14532d;
  --wrong-bg: #fee2e2; --wrong-border: #dc2626; --wrong-text: #7f1d1d;
  --reveal-bg: #dbeafe; --reveal-border: #2563eb; --reveal-text: #1e3a8a;
}
.qz-wrap { padding: 1rem 0; font-family: var(--font-sans); }
.qz-header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
.qz-header p { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 20px; font-family: var(--font-mono); }
.tabs { display: flex; align-items: center; border-bottom: 0.5px solid var(--color-border-secondary); margin-bottom: 20px; }
.tab-btn { font-size: 13px; font-weight: 500; padding: 8px 16px; border: none; background: none; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
.tab-btn.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); }
.tab-btn:hover:not(.active) { color: var(--color-text-primary); }
.reset-btn { margin-left: auto; font-family: var(--font-mono); font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); border-radius: var(--border-radius-md); cursor: pointer; }
.reset-btn:hover { color: var(--color-text-primary); border-color: var(--color-border-primary); }
.score-bar { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.score-pill { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 3px 10px; font-weight: 500; color: var(--color-text-primary); }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 20px 22px; margin-bottom: 12px; }
.q-num { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
.q-text { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 14px; color: var(--color-text-primary); }
.options { display: flex; flex-direction: column; gap: 6px; }
.opt { font-family: var(--font-sans); font-size: 13px; padding: 9px 13px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; text-align: left; line-height: 1.45; transition: border-color 0.15s, background 0.15s; }
.opt:hover:not([disabled]) { border-color: var(--color-border-info); background: var(--color-background-info); color: var(--color-text-info); }
.opt[disabled] { cursor: default; }
.opt-correct { font-family: var(--font-sans); font-size: 13px; padding: 9px 13px; border-radius: var(--border-radius-md); text-align: left; line-height: 1.45; cursor: default; border: 1.5px solid var(--correct-border) !important; background: var(--correct-bg) !important; color: var(--correct-text) !important; font-weight: 500; }
.opt-wrong { font-family: var(--font-sans); font-size: 13px; padding: 9px 13px; border-radius: var(--border-radius-md); text-align: left; line-height: 1.45; cursor: default; border: 1.5px solid var(--wrong-border) !important; background: var(--wrong-bg) !important; color: var(--wrong-text) !important; }
.opt-reveal { font-family: var(--font-sans); font-size: 13px; padding: 9px 13px; border-radius: var(--border-radius-md); text-align: left; line-height: 1.45; cursor: default; border: 1.5px solid var(--reveal-border) !important; background: var(--reveal-bg) !important; color: var(--reveal-text) !important; }
.opt-neutral { font-family: var(--font-sans); font-size: 13px; padding: 9px 13px; border-radius: var(--border-radius-md); text-align: left; line-height: 1.45; cursor: default; border: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.explanation { display: none; margin-top: 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }
.expl-title { font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-tertiary); margin-bottom: 8px; font-family: var(--font-mono); }
.expl-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.expl-list li { padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.expl-list li:last-child { border-bottom: none; }
</style>

<div class="qz-wrap">
  <div class="qz-header">
    <h2>Software Engineering — Quiz</h2>
    <p>Module 6 · Design Patterns</p>
  </div>
  <div class="tabs">
    <button class="tab-btn active">题目</button>
    <button class="reset-btn" onclick="resetQuiz()">Reset</button>
  </div>
  <div class="score-bar">Score: <span class="score-pill" id="score-display">— / 9</span></div>
  <div id="questions-container"></div>
</div>

<script>
const questions = [
  {
    num: 1,
    text: "Which of the following patterns does NOT belong to software Design pattern categories?",
    options: ["Creational patterns", "Structural patterns", "Behavioral patterns", "None of the above"],
    correct: 3,
    explanations: [
      "❌ Creational patterns — This IS a valid GoF design pattern category; covers object creation mechanisms.",
      "❌ Structural patterns — This IS a valid GoF category; deals with class/object composition.",
      "❌ Behavioral patterns — This IS a valid GoF category; characterizes object interaction and responsibility.",
      "✅ None of the above — All three options (Creational, Structural, Behavioral) are legitimate GoF categories, so none of them fails to belong. The correct answer is 'None of the above'."
    ]
  },
  {
    num: 2,
    text: "Which of the following statements is true about the Observer pattern?",
    options: [
      "The state of the observed subject cannot be changed once initialized",
      "There can be only one observer",
      "It separates the display of object state from the object itself",
      "It separates the display and the display implementation"
    ],
    correct: 2,
    explanations: [
      "❌ The state of the observed subject cannot be changed once initialized — False; the whole purpose of Observer is to notify observers when the subject's state changes.",
      "❌ There can be only one observer — False; Observer supports multiple observers registered to a single subject.",
      "✅ It separates the display of object state from the object itself — True; Observer decouples the subject (state holder) from its observers (display/reaction logic), allowing independent variation.",
      "❌ It separates the display and the display implementation — This describes a different concern (closer to MVC or Strategy); it is not the core definition of Observer."
    ]
  },
  {
    num: 3,
    text: "Which of the following is true about Behavioral patterns?",
    options: [
      "Concerned with the process of object creation",
      "Deal with the composition of classes or objects",
      "Characterize the ways in which classes or objects interact and distribute responsibility",
      "None of the above"
    ],
    correct: 2,
    explanations: [
      "❌ Concerned with the process of object creation — This describes Creational patterns, not Behavioral.",
      "❌ Deal with the composition of classes or objects — This describes Structural patterns, not Behavioral.",
      "✅ Characterize the ways in which classes or objects interact and distribute responsibility — This is the textbook definition of Behavioral patterns (e.g., Observer, Strategy, Iterator, Interpreter).",
      "❌ None of the above — Incorrect; option 3 is accurate."
    ]
  },
  {
    num: 4,
    text: "Which of the following statements is NOT true about using Design patterns?",
    options: [
      "Design patterns are reusable templates that help programmers solve some reoccurring issues in software development",
      "A class cannot participate in more than one Design pattern",
      "Using Design patterns improves code readability and flexibility"
    ],
    correct: 1,
    explanations: [
      "❌ Design patterns are reusable templates that help programmers solve some reoccurring issues in software development — This IS true; design patterns are reusable solutions to common problems.",
      "✅ A class cannot participate in more than one Design pattern — This is NOT true. A single class can and often does participate in multiple design patterns simultaneously.",
      "❌ Using Design patterns improves code readability and flexibility — This IS true; patterns provide shared vocabulary and proven structure that improve maintainability."
    ]
  },
  {
    num: 5,
    text: "Which of the following patterns allows a class behavior or its algorithm to be changed at run time?",
    options: ["Composite pattern", "Visitor pattern", "Iterator pattern", "Strategy pattern"],
    correct: 3,
    explanations: [
      "❌ Composite pattern — Addresses tree structures of objects; not about swapping algorithms at runtime.",
      "❌ Visitor pattern — Adds operations to objects without modifying them; behavior switching is not its primary purpose.",
      "❌ Iterator pattern — Provides sequential access to collection elements; unrelated to runtime algorithm switching.",
      "✅ Strategy pattern — Defines a family of algorithms, encapsulates each one, and makes them interchangeable at runtime without changing the client."
    ]
  },
  {
    num: 6,
    text: "Which of the following is NOT true about the Composite pattern?",
    options: [
      "The Leaf class implements all methods in the Component interface",
      "The Composite class implements methods to manipulate children",
      "The Component interface is the abstraction for all components, including composite ones",
      "The Component interface includes methods to manipulate children"
    ],
    correct: 3,
    explanations: [
      "❌ The Leaf class implements all methods in the Component interface — True; Leaf must implement the Component interface even if child-management methods are no-ops.",
      "❌ The Composite class implements methods to manipulate children — True; Composite holds and manages child components.",
      "❌ The Component interface is the abstraction for all components, including composite ones — True; both Leaf and Composite implement Component.",
      "✅ The Component interface includes methods to manipulate children — NOT true. Child-manipulation methods (add, remove, getChild) belong to the Composite class, not the Component interface. The interface only declares common operations shared by all components."
    ]
  },
  {
    num: 7,
    text: "In a 3D object manipulation library, objects as well as groups of objects need to support similar 3D transformations (e.g. resize, rotation). Which pattern could be best suitable?",
    options: ["Observer pattern", "Composite pattern", "Iterator pattern", "State pattern"],
    correct: 1,
    explanations: [
      "❌ Observer pattern — Handles publish-subscribe notification; not about treating individual and grouped objects uniformly.",
      "✅ Composite pattern — Ideal here: individual 3D objects (Leaf) and groups of objects (Composite) both implement the same Component interface, allowing uniform application of transformations.",
      "❌ Iterator pattern — Provides sequential traversal; does not address uniform treatment of objects and groups.",
      "❌ State pattern — Manages state-dependent behavior changes; unrelated to tree-structured object hierarchies."
    ]
  },
  {
    num: 8,
    text: "A hedge fund uses multiple trading strategies that need to be switched on-the-fly during a trading session. Which pattern could be best suitable?",
    options: ["Observer pattern", "Strategy pattern", "Iterator pattern", "Visitor pattern"],
    correct: 1,
    explanations: [
      "❌ Observer pattern — Suited for event notification across multiple listeners; not for swapping algorithms dynamically.",
      "✅ Strategy pattern — Designed exactly for this: encapsulate each trading strategy as an interchangeable object and swap them at runtime without changing the surrounding context.",
      "❌ Iterator pattern — Provides sequential access to elements; not relevant to algorithm switching.",
      "❌ Visitor pattern — Adds operations to an object structure without modifying it; does not address runtime strategy switching."
    ]
  },
  {
    num: 9,
    text: "Which of the following is NOT True about the Interpreter pattern?",
    options: [
      "The interpret method has \"Context\" as one of its method parameter types",
      "The TerminalExpression class has no children and can be interpreted directly",
      "The abstract syntax tree is made with Context instances",
      "The NonTerminalExpression maintains a list of Expressions as children"
    ],
    correct: 2,
    explanations: [
      "❌ The interpret method has \"Context\" as one of its method parameter types — True; the interpret(Context) signature passes shared state through the tree.",
      "❌ The TerminalExpression class has no children and can be interpreted directly — True; terminal expressions are leaf nodes that evaluate themselves.",
      "✅ The abstract syntax tree is made with Context instances — NOT true. The abstract syntax tree is composed of Expression instances (Terminal and NonTerminal). Context carries global information used during interpretation, but does not form the tree itself.",
      "❌ The NonTerminalExpression maintains a list of Expressions as children — True; NonTerminalExpression holds child expressions and delegates interpretation to them."
    ]
  }
];

let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    const optsHTML = q.options.map((opt, oi) =>
      `<button class="opt" id="opt-${idx}-${oi}" onclick="selectOption(${idx},${oi})">${opt}</button>`
    ).join('');
    const explItems = q.explanations.map(e => `<li>${e}</li>`).join('');
    card.innerHTML = `
      <div class="q-num">Q${q.num}</div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="options" id="opts-${idx}">${optsHTML}</div>
      <div class="explanation" id="expl-${idx}">
        <div class="expl-title">Explanation</div>
        <ul class="expl-list">${explItems}</ul>
      </div>`;
    container.appendChild(card);
  });
  updateScore();
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;
  if (isCorrect) correctCount++;
  q.options.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${qIdx}-${oi}`);
    btn.disabled = true;
    if (oi === optIdx && isCorrect) btn.className = 'opt-correct';
    else if (oi === optIdx && !isCorrect) btn.className = 'opt-wrong';
    else if (oi === q.correct && !isCorrect) btn.className = 'opt-reveal';
    else btn.className = 'opt-neutral';
  });
  document.getElementById(`expl-${qIdx}`).style.display = 'block';
  updateScore();
}

function updateScore() {
  const total = answered.filter(Boolean).length;
  document.getElementById('score-display').textContent = total === 0 ? '— / 9' : `${correctCount} / ${total} answered`;
}

function resetQuiz() {
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  buildQuestions();
}

buildQuestions();
</script>
