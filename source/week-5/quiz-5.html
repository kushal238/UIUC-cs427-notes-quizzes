<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UML Quiz</title>
<style>
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
  --text: #1a1a18; --muted: #7a7870; --accent: #2d5be3;
  --correct-bg: #e8f5e2; --correct-border: #3a9e5c; --correct-text: #1e5c34;
  --wrong-bg: #fce8e8; --wrong-border: #d94040; --wrong-text: #7a1f1f;
  --reveal-bg: #e8f0fd; --reveal-border: #2d5be3; --reveal-text: #1a3a8a;
  --explain-bg: #f2f1ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px; }
.container { max-width: 780px; margin: 0 auto; }
h1 { font-family: monospace; font-size: 1rem; font-weight: 500; letter-spacing: .06em; color: var(--muted); margin-bottom: 24px; text-transform: uppercase; }
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 0; }
.tab-btn { font-size: .88rem; font-weight: 500; padding: 10px 20px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 4px 4px 0 0; transition: all .15s; }
.tab-btn:hover { color: var(--text); background: var(--border); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.panel-header { display: flex; justify-content: flex-end; padding: 12px 0 20px; }
.reset-btn { font-family: monospace; font-size: .78rem; padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; }
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }
.q-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.q-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
.q-num { font-family: monospace; font-size: .72rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.q-text { font-size: .95rem; font-weight: 500; line-height: 1.55; }
.q-diagram { background: #f8f7f3; border-top: 1px solid var(--border); padding: 12px; text-align: center; }
.q-diagram img { max-width: 100%; max-height: 200px; border-radius: 4px; object-fit: contain; }
.q-options { padding: 12px 20px 16px; }
.opt { display: block; width: 100%; text-align: left; font-size: .9rem; padding: 10px 14px; margin-bottom: 8px; border: 1.5px solid var(--border); border-radius: 6px; background: #fafaf8; color: var(--text); cursor: pointer; transition: border-color .15s, background .15s; line-height: 1.45; }
.opt:hover:not(:disabled) { border-color: var(--accent); background: var(--reveal-bg); }
.opt:disabled { cursor: default; }
.opt-correct { display: block; width: 100%; text-align: left; font-size: .9rem; padding: 10px 14px; margin-bottom: 8px; border-radius: 6px; line-height: 1.45; border: 2px solid var(--correct-border) !important; background: var(--correct-bg) !important; color: var(--correct-text) !important; font-weight: 600 !important; cursor: default; }
.opt-wrong { display: block; width: 100%; text-align: left; font-size: .9rem; padding: 10px 14px; margin-bottom: 8px; border-radius: 6px; line-height: 1.45; border: 2px solid var(--wrong-border) !important; background: var(--wrong-bg) !important; color: var(--wrong-text) !important; cursor: default; }
.opt-reveal { display: block; width: 100%; text-align: left; font-size: .9rem; padding: 10px 14px; margin-bottom: 8px; border-radius: 6px; line-height: 1.45; border: 2px solid var(--reveal-border) !important; background: var(--reveal-bg) !important; color: var(--reveal-text) !important; font-weight: 600 !important; cursor: default; }
.opt-plain { display: block; width: 100%; text-align: left; font-size: .9rem; padding: 10px 14px; margin-bottom: 8px; border: 1.5px solid var(--border); border-radius: 6px; background: #f0efeb; color: var(--muted); cursor: default; line-height: 1.45; }
.explanation { display: none; margin: 0 20px 14px; background: var(--explain-bg); border-radius: 6px; padding: 14px 16px; font-size: .85rem; line-height: 1.7; color: #3a3a36; }
.explanation.show { display: block; }
.explanation ul { list-style: none; padding: 0; margin: 0; }
.explanation li { padding: 4px 0; border-bottom: 1px solid #e6e4dc; }
.explanation li:last-child { border-bottom: none; }
</style>
</head>

function buildQuestions(questions, tabId) {
  const container = document.getElementById('questions-' + tabId);
  container.innerHTML = '';
  questions.forEach(function(q, qi) {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = tabId + '-q' + qi;

    const hdr = document.createElement('div');
    hdr.className = 'q-header';
    hdr.innerHTML = '<div class="q-num">Question ' + q.num + '</div><div class="q-text">' + q.text.replace(/\n/g,'<br>') + '</div>';
    if (q.diagram) {
      hdr.innerHTML += '<div class="q-diagram"><img src="' + IMGS[q.diagram] + '" alt="Class Diagram"/></div>';
    }
    card.appendChild(hdr);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'q-options';
    q.options.forEach(function(opt, oi) {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = opt;
      btn.onclick = (function(b, qqi, ooi) {
        return function() { handleAnswer(b, qqi, ooi, tabId, questions); };
      })(btn, qi, oi);
      optsDiv.appendChild(btn);
    });
    card.appendChild(optsDiv);

    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.id = tabId + '-exp' + qi;
    const ul = document.createElement('ul');
    q.explanation.forEach(function(e) {
      const li = document.createElement('li');
      li.textContent = e;
      ul.appendChild(li);
    });
    exp.appendChild(ul);
    card.appendChild(exp);
    container.appendChild(card);
  });
}

function handleAnswer(btn, qi, oi, tabId, questions) {
  const q = questions[qi];
  const card = document.getElementById(tabId + '-q' + qi);
  const allBtns = card.querySelectorAll('button');
  allBtns.forEach(function(b, idx) {
    b.disabled = true;
    if (idx === q.correct) {
      b.className = (oi === q.correct) ? 'opt-correct' : 'opt-reveal';
    } else if (idx === oi) {
      b.className = 'opt-wrong';
    } else {
      b.className = 'opt-plain';
    }
  });
  document.getElementById(tabId + '-exp' + qi).classList.add('show');
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('[onclick="switchTab(\'' + tabId + '\')"]').classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

function resetTab(tabId) {
  buildQuestions(courseraQuestions, tabId);
}

buildQuestions(courseraQuestions, 'coursera');
</script>
