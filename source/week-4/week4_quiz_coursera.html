<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e2e2de;
    --text: #1a1a18;
    --muted: #6b6b67;
    --accent: #2563eb;
    --correct-bg: #dcfce7;
    --correct-border: #16a34a;
    --correct-text: #14532d;
    --wrong-bg: #fee2e2;
    --wrong-border: #dc2626;
    --wrong-text: #7f1d1d;
    --reveal-bg: #dbeafe;
    --reveal-border: #2563eb;
    --reveal-text: #1e3a8a;
    --expl-bg: #f3f4f6;
    --radius: 6px;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  header h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 0.82rem; color: var(--muted); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

  .tabs {
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--border);
    margin-bottom: 28px;
    gap: 0;
  }

  .tab-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 10px 18px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
    padding-bottom: 2px;
  }

  .action-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    padding: 5px 11px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--text); color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .score-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 500;
    color: var(--text);
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 14px;
  }
  .q-card:hover { border-color: #c8c8c4; }

  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .q-text {
    font-size: 0.93rem;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 16px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 7px; }

  .opt {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.45;
  }
  .opt:hover:not([disabled]) { border-color: var(--accent); background: #eff6ff; }
  .opt[disabled] { cursor: default; }

  .opt-correct {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px;
    border-radius: var(--radius);
    text-align: left;
    line-height: 1.45;
    cursor: default;
    border: 1.5px solid var(--correct-border) !important;
    background: var(--correct-bg) !important;
    color: var(--correct-text) !important;
    font-weight: 500;
  }

  .opt-wrong {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px;
    border-radius: var(--radius);
    text-align: left;
    line-height: 1.45;
    cursor: default;
    border: 1.5px solid var(--wrong-border) !important;
    background: var(--wrong-bg) !important;
    color: var(--wrong-text) !important;
  }

  .opt-reveal {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px;
    border-radius: var(--radius);
    text-align: left;
    line-height: 1.45;
    cursor: default;
    border: 1.5px solid var(--reveal-border) !important;
    background: var(--reveal-bg) !important;
    color: var(--reveal-text) !important;
  }

  .opt-neutral {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px;
    border-radius: var(--radius);
    text-align: left;
    line-height: 1.45;
    cursor: default;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
  }

  .explanation {
    display: none;
    margin-top: 12px;
    background: var(--expl-bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 0.83rem;
    color: var(--text);
    line-height: 1.6;
  }
  .explanation.show { display: block; }

  .expl-title {
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .expl-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .expl-list li {
    padding: 4px 0;
    border-bottom: 1px solid #e5e5e2;
    font-size: 0.83rem;
    line-height: 1.55;
  }
  .expl-list li:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Software Engineering — Quiz</h1>
    <p>Week 4 · Software Architecture &amp; Modularity</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('coursera', this)">题目</button>
    <div class="tab-actions">
      <button class="action-btn" onclick="revealAll()">Reveal All</button>
      <button class="action-btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="tab-coursera" class="tab-panel active">
    <div class="score-bar">
      Score: <span class="score-pill" id="score-display">— / 10</span>
    </div>
    <div id="questions-container"></div>
  </div>
</div>

<script>
const questions = [
  {
    num: 1,
    text: "True or False: Under the abstraction of using a Unix file descriptor, a process needs to know a file's actual name in order to get access to it.",
    options: ["True", "False"],
    correct: 1,
    explanations: [
      "❌ True — Incorrect. The whole point of the file descriptor abstraction is that a process does NOT need to know the actual file name. Once a file descriptor is obtained, the process accesses the file through that integer handle.",
      "✅ False — Correct. A Unix file descriptor is an abstraction: once the OS opens a file and returns a descriptor, the process can read/write using only that descriptor, without knowing the file's actual name or location."
    ]
  },
  {
    num: 2,
    text: "If functions in a module have similar functionalities, then this module has ________",
    options: ["Coincidental cohesion", "Communicational cohesion", "Logical cohesion", "Temporal cohesion"],
    correct: 2,
    explanations: [
      "❌ Coincidental cohesion — Incorrect. Coincidental cohesion means functions are grouped arbitrarily with no meaningful relationship at all.",
      "❌ Communicational cohesion — Incorrect. Communicational cohesion means functions operate on the same data or share the same input/output, not that they have similar functionalities.",
      "✅ Logical cohesion — Correct. Logical cohesion occurs when functions in a module perform similar or related operations (e.g., all types of I/O), but are selected via a control flag. 'Similar functionalities' is the defining characteristic.",
      "❌ Temporal cohesion — Incorrect. Temporal cohesion groups functions that execute at the same time (e.g., all startup routines), not because of similar functionalities."
    ]
  },
  {
    num: 3,
    text: "Assume that you are an architect for a data-processing project. You have designed an application in such a way that the front-end component receives sensor data from devices, and the data flow from one component to the next component. Each component subsequently transforms the data and passes the transformed data to the next component. The final component passes the finally transformed data to a modelling and visualization unit that renders the data to the end-users. The architecture style that you are using in this application is ______",
    options: ["Layered/tiered style", "Architectural style", "Pipe-and-filter style"],
    correct: 2,
    explanations: [
      "❌ Layered/tiered style — Incorrect. Layered architecture organizes components into horizontal layers (e.g., presentation, business logic, data), where each layer only communicates with the adjacent one. It doesn't describe sequential data transformation.",
      "❌ Architectural style — Incorrect. 'Architectural style' is a general term/category, not a specific style name. It cannot be the answer.",
      "✅ Pipe-and-filter style — Correct. The scenario describes data flowing through a sequence of independent components (filters), each transforming the data and passing it along via pipes. This is the textbook definition of pipe-and-filter architecture."
    ]
  },
  {
    num: 4,
    text: "A product group in a large company is working on developing a compiler for a platform. Within this product group, each of multiple teams is formed for reflecting the component maintained by the team, such as the compiler front-end team and the compiler back-end team. The reflection of such team organization is known as ______",
    options: ["Brook's Law", "Conway's Law", "Moore's Law", "Bell's Law"],
    correct: 1,
    explanations: [
      "❌ Brook's Law — Incorrect. Brooks' Law states that adding manpower to a late software project makes it later. It's about project management, not team-architecture mirroring.",
      "✅ Conway's Law — Correct. Conway's Law states that organizations design systems that mirror their own communication structure. Here, the team structure (front-end team, back-end team) directly mirrors the system's component architecture.",
      "❌ Moore's Law — Incorrect. Moore's Law describes the doubling of transistors on integrated circuits approximately every two years. It's about hardware, not software team organization.",
      "❌ Bell's Law — Incorrect. Bell's Law describes the emergence of new classes of computers every decade. It's about computing history, not organizational structure."
    ]
  },
  {
    num: 5,
    text: "In the UNIX pipe-and-filter architecture, which of the following is NOT true?",
    options: [
      "The data get processed as soon as they arrive",
      "Filters know each other and share state",
      "Data can be passed in only one direction",
      "Filters can be implemented in parallel"
    ],
    correct: 1,
    explanations: [
      "❌ The data get processed as soon as they arrive — This IS true. Filters process data incrementally as it streams through; they don't wait for all data to arrive.",
      "✅ Filters know each other and share state — This is NOT true. A core principle of pipe-and-filter is that filters are independent: they do not know about each other and do not share state. Each filter is a self-contained processing unit.",
      "❌ Data can be passed in only one direction — This IS true (in standard Unix pipes). Data flows unidirectionally from one filter to the next.",
      "❌ Filters can be implemented in parallel — This IS true. Because filters are independent and stateless, they can run concurrently."
    ]
  },
  {
    num: 6,
    text: "Which of following is NOT a function of connectors?",
    options: [
      "Interactions among components",
      "Encapsulates computation and/or data in the system",
      "Rules that govern those interactions"
    ],
    correct: 1,
    explanations: [
      "❌ Interactions among components — This IS a connector function. Connectors mediate and facilitate communication between components.",
      "✅ Encapsulates computation and/or data in the system — This is NOT a connector function. Encapsulating computation and data is the role of Components. Connectors manage interactions, not computation.",
      "❌ Rules that govern those interactions — This IS a connector function. Connectors define the protocols and rules that determine how components communicate."
    ]
  },
  {
    num: 7,
    text: "The component in the MVC pattern for receiving user-gesture events is named ______",
    options: ["Model", "Controller", "View"],
    correct: 1,
    explanations: [
      "❌ Model — Incorrect. The Model holds the application's data and business logic. It does not interact directly with user input events.",
      "✅ Controller — Correct. The Controller is the MVC component responsible for receiving and handling user-gesture events (clicks, key presses, etc.). It then updates the Model or View accordingly.",
      "❌ View — Incorrect. The View renders data to the user (the visual presentation layer). While it displays the UI, the responsibility for handling input events belongs to the Controller."
    ]
  },
  {
    num: 8,
    text: "A chart, a pie table, and a bar table can show the same information from the database, due to which feature of MVC?",
    options: [
      "Ability to provide multiple views",
      "Support for asynchronous technique",
      "The modification not affecting the entire model"
    ],
    correct: 0,
    explanations: [
      "✅ Ability to provide multiple views — Correct. MVC decouples the Model from the View. Because of this separation, the same Model (database data) can be bound to multiple different View implementations (chart, pie, bar) simultaneously without any conflict.",
      "❌ Support for asynchronous technique — Incorrect. Asynchronous support is not a defining MVC feature and does not explain why the same data can be displayed in multiple formats.",
      "❌ The modification not affecting the entire model — Incorrect. While MVC does provide isolation between layers, this option describes change containment, not the ability to render data in multiple visual forms."
    ]
  },
  {
    num: 9,
    text: "Which of the statement about software modularity is NOT correct with respect to benefits of software modularity?",
    options: [
      "Modules are robust",
      "A module can use other modules",
      "Modules can be separately compiled and stored in a library",
      "Modules are mostly dependent"
    ],
    correct: 3,
    explanations: [
      "❌ Modules are robust — This IS a correct benefit. Modules are self-contained, so failures are isolated and do not easily propagate to other parts of the system.",
      "❌ A module can use other modules — This IS a correct benefit. Modularity encourages reuse; modules can depend on well-defined interfaces of other modules.",
      "❌ Modules can be separately compiled and stored in a library — This IS a correct benefit. Independent compilation reduces build times and allows modules to be distributed as reusable libraries.",
      "✅ Modules are mostly dependent — This is NOT correct. A key goal of modularity is to make modules mostly independent (low coupling). High dependency between modules defeats the purpose of modular design."
    ]
  },
  {
    num: 10,
    text: "Which of the following is the worst type of module cohesion among the following options?",
    options: [
      "Logical Cohesion",
      "Temporal Cohesion",
      "Functional Cohesion",
      "Coincidental Cohesion"
    ],
    correct: 3,
    explanations: [
      "❌ Logical Cohesion — Not the worst. Logical cohesion is weak, but it still groups functions with related (if loosely defined) purposes.",
      "❌ Temporal Cohesion — Not the worst. Temporal cohesion groups functions by when they execute; it is low quality but still has a temporal rationale.",
      "❌ Functional Cohesion — Incorrect; this is actually the BEST type of cohesion. All elements contribute to a single, well-defined task.",
      "✅ Coincidental Cohesion — Correct. Coincidental cohesion is the worst type. Functions are grouped with no meaningful relationship whatsoever — purely by accident or convenience. It produces highly unmaintainable modules."
    ]
  }
];

let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `qcard-${idx}`;

    const optionsHTML = q.options.map((opt, oi) =>
      `<button class="opt" id="opt-${idx}-${oi}" onclick="selectOption(${idx}, ${oi})">${opt}</button>`
    ).join('');

    const explItems = q.explanations.map(e => `<li>${e}</li>`).join('');

    card.innerHTML = `
      <div class="q-num">Q${q.num}</div>
      <div class="q-text">${q.text.replace(/\n/g, '<br>')}</div>
      <div class="options" id="opts-${idx}">${optionsHTML}</div>
      <div class="explanation" id="expl-${idx}">
        <div class="expl-title">Explanation</div>
        <ul class="expl-list">${explItems}</ul>
      </div>
    `;
    container.appendChild(card);
  });
  updateScore();
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;

  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;
  if (isCorrect) correctCount++;

  q.options.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${qIdx}-${oi}`);
    btn.disabled = true;
    if (oi === optIdx && isCorrect) {
      btn.className = 'opt-correct';
    } else if (oi === optIdx && !isCorrect) {
      btn.className = 'opt-wrong';
    } else if (oi === q.correct && !isCorrect) {
      btn.className = 'opt-reveal';
    } else {
      btn.className = 'opt-neutral';
    }
  });

  document.getElementById(`expl-${qIdx}`).classList.add('show');
  updateScore();
}

function revealAll() {
  questions.forEach((q, qIdx) => {
    if (answered[qIdx]) return;
    answered[qIdx] = true;

    q.options.forEach((_, oi) => {
      const btn = document.getElementById(`opt-${qIdx}-${oi}`);
      btn.disabled = true;
      btn.className = oi === q.correct ? 'opt-reveal' : 'opt-neutral';
    });

    document.getElementById(`expl-${qIdx}`).classList.add('show');
  });
  updateScore();
}

function resetAll() {
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  buildQuestions();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function updateScore() {
  const total = answered.filter(Boolean).length;
  document.getElementById('score-display').textContent =
    total === 0 ? '— / 10' : `${correctCount} / ${total} answered`;
}

buildQuestions();
</script>
</body>
</html>
