<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 4 Mind Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Source+Sans+3:wght@400;500;600&family=Source+Code+Pro:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e4e2dc;
  --text: #1c1b18;
  --text2: #4a4840;
  --muted: #9a9790;

  --c0: #1c1b18;   /* root */
  --c1: #2d5fa6;   /* Architecture Styles */
  --c2: #4a3d7c;   /* MVC */
  --c3: #8b3a3a;   /* Components & Connectors */
  --c4: #3d6b4f;   /* Modularity */
  --c5: #7c5c2e;   /* Cohesion */
  --c6: #2d7a7a;   /* Abstraction */
  --c7: #5c6b2e;   /* Laws */
  --surface2: #ebe9e4;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  font-family: 'Source Sans 3', sans-serif;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

/* canvas：SVG 由脚本给出宽高，可大于视口以便滚动 */
#canvas {
  display: block;
  width: 100%;
  min-width: 100%;
  box-sizing: border-box;
}
#svg {
  display: block;
  max-width: none;
}

/* tooltip */
#tip {
  position: fixed;
  background: var(--surface);
  border: none;
  border-radius: 8px;
  padding: 10px 13px;
  max-width: 240px;
  font-size: 0.81rem;
  color: var(--text2);
  line-height: 1.55;
  box-shadow: 0 4px 18px rgba(0,0,0,.1);
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  z-index: 300;
}
#tip.show { opacity: 1; }
#tip b { display: block; color: var(--text); font-size: 0.84rem; margin-bottom: 3px; }
</style>
</head>
<body>

<div id="canvas">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="sh">
        <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#00000013"/>
      </filter>
    </defs>
  </svg>
</div>
<div id="tip"></div>

<script>
/* ═══════════════════════════════════════════
   TREE DATA
   Every node: { id, label, sub?, color, tip?, children? }
═══════════════════════════════════════════ */
const TREE = {
  id: 'root',
  hidden: true,
  children: [
    {
      id: 'arch', label: 'Architecture Styles', sub: '架构风格', color: 'var(--c1)',
      tip: '定义系统高层结构的设计模式，规定组件如何组织与交互。',
      children: [
        {
          id: 'pf', label: 'Pipe-and-Filter', color: 'var(--c1)',
          tip: '数据单向流经独立 Filter，每个 Filter 无状态、互不知晓，可并行执行。典型：Unix 管道。',
          children: [
            { id: 'pf1', label: 'Filters are independent', color: 'var(--c1)' },
            { id: 'pf2', label: 'No shared state', color: 'var(--c1)' },
            { id: 'pf3', label: 'One-direction data flow', color: 'var(--c1)' },
            { id: 'pf4', label: 'Filters can run in parallel', color: 'var(--c1)' },
          ]
        },
        {
          id: 'layer', label: 'Layered / Tiered', color: 'var(--c1)',
          tip: '系统分水平层，每层只与相邻层通信。典型：TCP/IP 协议栈。',
          children: [
            { id: 'l1', label: 'Talks to adjacent layers only', color: 'var(--c1)' },
            { id: 'l2', label: 'e.g. TCP/IP stack', color: 'var(--c1)' },
          ]
        },
      ]
    },
    {
      id: 'mvc', label: 'MVC Pattern', sub: 'Model · View · Controller', color: 'var(--c2)',
      tip: '将应用分为 Model（数据）、View（呈现）、Controller（输入），实现关注点分离。',
      children: [
        {
          id: 'model', label: 'Model', color: 'var(--c2)',
          tip: '持有数据与业务逻辑，与 UI 完全无关。',
          children: [
            { id: 'm1', label: 'Data & business logic', color: 'var(--c2)' },
            { id: 'm2', label: 'Independent of UI', color: 'var(--c2)' },
          ]
        },
        {
          id: 'view', label: 'View', color: 'var(--c2)',
          tip: '负责可视化呈现。同一 Model 可绑定多个 View（chart / pie / bar）。',
          children: [
            { id: 'v1', label: 'Visual presentation', color: 'var(--c2)' },
            { id: 'v2', label: 'Multiple views of same data', color: 'var(--c2)' },
          ]
        },
        {
          id: 'ctrl', label: 'Controller', color: 'var(--c2)',
          tip: '接收 user-gesture events，协调 Model 与 View 的更新。',
          children: [
            { id: 'c1', label: 'Receives user-gesture events', color: 'var(--c2)' },
            { id: 'c2', label: 'Coordinates Model & View', color: 'var(--c2)' },
          ]
        },
      ]
    },
    {
      id: 'cc', label: 'Components & Connectors', sub: '组件与连接器', color: 'var(--c3)',
      tip: '架构的两类基本要素：Component 封装计算与数据；Connector 管理交互。',
      children: [
        {
          id: 'comp', label: 'Component', color: 'var(--c3)',
          tip: '封装计算逻辑和/或数据的独立单元。',
          children: [
            { id: 'co1', label: 'Encapsulates computation & data', color: 'var(--c3)' },
            { id: 'co2', label: 'e.g. Service, Filter, Module', color: 'var(--c3)' },
          ]
        },
        {
          id: 'conn', label: 'Connector', color: 'var(--c3)',
          tip: '管理组件间交互，定义交互规则。不封装数据——那是 Component 的职责。',
          children: [
            { id: 'cn1', label: 'Manages interactions', color: 'var(--c3)' },
            { id: 'cn2', label: 'Governs interaction rules', color: 'var(--c3)' },
            { id: 'cn3', label: 'NOT: encapsulate data  ⚠', color: 'var(--c3)' },
          ]
        },
      ]
    },
    {
      id: 'mod', label: 'Modularity', sub: '软件模块化', color: 'var(--c4)',
      tip: '将系统分解为独立模块，模块间低耦合、高内聚，通过接口通信。',
      children: [
        {
          id: 'bens', label: 'Benefits', color: 'var(--c4)',
          tip: '模块化带来鲁棒性、可复用性、独立编译，以及模块间的独立性（非依赖性）。',
          children: [
            { id: 'b1', label: 'Robust & failure-isolated', color: 'var(--c4)' },
            { id: 'b2', label: 'Reusable', color: 'var(--c4)' },
            { id: 'b3', label: 'Separately compiled', color: 'var(--c4)' },
            { id: 'b4', label: 'Mostly independent  ✓', color: 'var(--c4)' },
          ]
        },
      ]
    },
    {
      id: 'coh', label: 'Module Cohesion', sub: '模块内聚性', color: 'var(--c5)',
      tip: '衡量模块内部元素关联紧密程度，从最差到最佳排列。',
      children: [
        {
          id: 'cworst', label: 'Coincidental  ← worst', color: 'var(--c5)',
          tip: '最差。函数随意打包，毫无逻辑关联。',
          children: [
            { id: 'cw1', label: 'No meaningful relationship', color: 'var(--c5)' },
          ]
        },
        {
          id: 'clog', label: 'Logical', color: 'var(--c5)',
          tip: '函数功能相似（similar functionalities）但执行不同任务，通过参数选择。',
          children: [
            { id: 'cl1', label: 'Similar functionalities', color: 'var(--c5)' },
            { id: 'cl2', label: 'Selected by control flag', color: 'var(--c5)' },
          ]
        },
        {
          id: 'ctemp', label: 'Temporal', color: 'var(--c5)',
          tip: '函数在同一时间段执行（如初始化）。',
          children: [
            { id: 'ct1', label: 'Execute at same time', color: 'var(--c5)' },
          ]
        },
        {
          id: 'cfunc', label: 'Functional  ← best', color: 'var(--c5)',
          tip: '最佳。所有函数共同完成单一明确任务。',
          children: [
            { id: 'cf1', label: 'Single well-defined task', color: 'var(--c5)' },
          ]
        },
      ]
    },
    {
      id: 'abs', label: 'Abstraction', sub: '抽象', color: 'var(--c6)',
      tip: '隐藏内部实现，只暴露接口。Unix File Descriptor 是经典例子。',
      children: [
        {
          id: 'fd', label: 'Unix File Descriptor', color: 'var(--c6)',
          tip: '进程通过整数 handle 访问文件，无需知道实际文件名或存储位置。',
          children: [
            { id: 'fd1', label: 'No actual filename needed  ✓', color: 'var(--c6)' },
            { id: 'fd2', label: 'Integer handle abstraction', color: 'var(--c6)' },
            { id: 'fd3', label: 'Transparent underlying type', color: 'var(--c6)' },
          ]
        },
      ]
    },
    {
      id: 'laws', label: 'Key Laws', sub: '重要定律', color: 'var(--c7)',
      tip: '本章涉及的两条重要软件工程定律。',
      children: [
        {
          id: 'conway', label: "Conway's Law", color: 'var(--c7)',
          tip: '系统架构镜像团队沟通结构。团队边界 ≈ 模块边界。',
          children: [
            { id: 'cw1b', label: 'System mirrors team structure', color: 'var(--c7)' },
            { id: 'cw2', label: 'Team boundary ≈ module boundary', color: 'var(--c7)' },
          ]
        },
        {
          id: 'brooks', label: "Brooks' Law", color: 'var(--c7)',
          tip: '向延期项目增人反而更慢。新成员 onboarding + communication overhead。',
          children: [
            { id: 'br1', label: 'Adding people → slower', color: 'var(--c7)' },
            { id: 'br2', label: 'Communication overhead ↑', color: 'var(--c7)' },
          ]
        },
      ]
    },
  ]
};

/* ═══════════════════════════════════════════
   LAYOUT: horizontal tree, root on left
═══════════════════════════════════════════ */
const COL_W   = 340;   // 列距（放大后横向可滚动阅读）
const ROW_H   = 58;    // 行距：与 MIN_SCALE 配合保证屏幕上字高可读
const PAD_X   = 56;
const PAD_Y   = 40;

// Node box sizing（再放大一档，匹配更大字号）
function boxSize(node) {
  if (node.hidden)     return { w: 0, h: 0 };
  if (!node.children)  return { w: 300, h: 44 };  // leaf
  if (node.children && node.children[0]?.children) return { w: 268, h: 54 }; // branch (has grandchildren)
  return { w: 248, h: 48 }; // mid
}

// Count leaf slots under a node
function countLeaves(node) {
  if (!node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

// Assign y positions (top of slot range), x by depth（hidden 根不占位，子节点从 depth 0 起画）
function assignPositions(node, depth, slotTop) {
  const sz = boxSize(node);
  const leaves = countLeaves(node);
  const totalH = leaves * ROW_H;
  node.x = PAD_X + depth * COL_W;
  node.y = slotTop + totalH / 2;
  node._sz = sz;

  if (node.children) {
    let cursor = slotTop;
    const nextDepth = node.hidden ? depth : depth + 1;
    node.children.forEach(c => {
      const cLeaves = countLeaves(c);
      assignPositions(c, nextDepth, cursor);
      cursor += cLeaves * ROW_H;
    });
  }
}

// Collect all nodes & edges（不连接 hidden 根，避免多余线）
function collectAll(node, nodes = [], edges = []) {
  nodes.push(node);
  if (node.children) {
    node.children.forEach(c => {
      if (!node.hidden) edges.push({ from: node, to: c });
      collectAll(c, nodes, edges);
    });
  }
  return { nodes, edges };
}

/* ═══════════════════════════════════════════
   SVG RENDER
═══════════════════════════════════════════ */
const svg = document.getElementById('svg');
let vx = 0, vy = 0, sc = 1;

function hexForVar(v) {
  // resolve CSS var to actual color for SVG stroke
  const map = {
    'var(--c0)': '#1c1b18',
    'var(--c1)': '#2d5fa6',
    'var(--c2)': '#4a3d7c',
    'var(--c3)': '#8b3a3a',
    'var(--c4)': '#3d6b4f',
    'var(--c5)': '#7c5c2e',
    'var(--c6)': '#2d7a7a',
    'var(--c7)': '#5c6b2e',
  };
  return map[v] || '#888';
}

function lightHex(v) {
  const map = {
    'var(--c0)': '#f0efec',
    'var(--c1)': '#ebf1fb',
    'var(--c2)': '#f2f0fd',
    'var(--c3)': '#fdf0f0',
    'var(--c4)': '#edf4ef',
    'var(--c5)': '#fdf4e7',
    'var(--c6)': '#edf7f7',
    'var(--c7)': '#f4f7ed',
  };
  return map[v] || '#f5f5f5';
}

function makeEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function renderTree() {
  // remove old group
  const old = svg.getElementById('g-main');
  if (old) old.remove();

  assignPositions(TREE, 0, PAD_Y);
  const { nodes, edges } = collectAll(TREE);

  const g = makeEl('g', { id: 'g-main', transform: `translate(${vx},${vy}) scale(${sc})` });
  svg.appendChild(g);

  // edges first
  edges.forEach(({ from, to }) => {
    const color = hexForVar(to.color);
    const x1 = from.x + from._sz.w / 2;
    const y1 = from.y;
    const x2 = to.x - to._sz.w / 2;
    const y2 = to.y;
    const mx = (x1 + x2) / 2;
    const depth = to.children ? (to.children[0]?.children ? 1 : 2) : 3;
    const sw = depth === 1 ? 1.8 : depth === 2 ? 1.4 : 1.1;
    const op = depth === 1 ? 0.55 : depth === 2 ? 0.45 : 0.35;
    const path = makeEl('path', {
      d: `M ${x1} ${y1} C ${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`,
      fill: 'none', stroke: color,
      'stroke-width': sw, opacity: op,
      'stroke-linecap': 'round',
    });
    g.appendChild(path);
  });

  // nodes
  nodes.forEach(node => {
    if (node.hidden) return;
    const { w, h } = node._sz;
    const color = hexForVar(node.color);
    const light = lightHex(node.color);
    const isLeaf = !node.children;
    const isBranch = node.children && node.children[0]?.children;

    const ng = makeEl('g', { cursor: 'default' });

    if (isLeaf) {
      // leaf: just a text with a subtle left tick
      const tick = makeEl('line', {
        x1: node.x - w/2 - 2, y1: node.y,
        x2: node.x - w/2 + 3, y2: node.y,
        stroke: color, 'stroke-width': '2', opacity: '0.6'
      });
      ng.appendChild(tick);
      const t = makeEl('text', {
        x: node.x - w/2 + 10, y: node.y,
        'font-family': "'Source Code Pro', monospace",
        'font-size': '19',
        fill: color,
        opacity: '0.95',
        'dominant-baseline': 'middle',
        'text-anchor': 'start',
      });
      t.textContent = node.label;
      ng.appendChild(t);
    } else {
      // box node
      const rx_val = isBranch ? 10 : 8;
      const rect = makeEl('rect', {
        x: node.x - w/2, y: node.y - h/2,
        width: w, height: h,
        rx: rx_val, ry: rx_val,
        fill: light,
        stroke: color,
        'stroke-width': isBranch ? '2' : '1.5',
        filter: 'url(#sh)',
      });
      ng.appendChild(rect);

      const mainY = node.sub ? node.y - 11 : node.y;
      const t = makeEl('text', {
        x: node.x, y: mainY,
        'font-family': "'Source Sans 3', sans-serif",
        'font-size': isBranch ? '21' : '19',
        'font-weight': isBranch ? '600' : '500',
        fill: color,
        'dominant-baseline': 'middle',
        'text-anchor': 'middle',
      });
      t.textContent = node.label;
      ng.appendChild(t);

      if (node.sub) {
        const t2 = makeEl('text', {
          x: node.x, y: node.y + 14,
          'font-family': "'Source Code Pro', monospace",
          'font-size': '14',
          fill: color, opacity: '0.7',
          'dominant-baseline': 'middle',
          'text-anchor': 'middle',
        });
        t2.textContent = node.sub;
        ng.appendChild(t2);
      }

      // tooltip
      if (node.tip) {
        ng.style.cursor = 'pointer';
        ng.addEventListener('mouseenter', () => showTip(node));
        ng.addEventListener('mouseleave', hideTip);
      }
    }

    g.appendChild(ng);
  });

  fitTransformToContent();
}

/* 缩放：优先可读性；过小时用下限比例并允许页面滚动，避免字缩成蚂蚁 */
function fitTransformToContent() {
  const { nodes } = collectAll(TREE);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(function (n) {
    if (n.hidden) return;
    const w = n._sz.w, h = n._sz.h;
    minX = Math.min(minX, n.x - w / 2);
    maxX = Math.max(maxX, n.x + w / 2);
    minY = Math.min(minY, n.y - h / 2);
    maxY = Math.max(maxY, n.y + h / 2);
  });
  var pad = 36;
  var bw = Math.max(maxX - minX, 1);
  var bh = Math.max(maxY - minY, 1);
  var W = window.innerWidth, H = window.innerHeight;
  var scFit = Math.min((W - pad * 2) / bw, (H - pad * 2) / bh, 10);
  // 行距在屏幕上的高度约 ≥ 22px；叶子字高约 ≥ 13px（略随窗口变化）
  var MIN_SC = Math.max(22 / ROW_H, 13 / 19, 0.52);
  sc = Math.max(scFit, MIN_SC);
  sc = Math.min(sc, 3.5);
  // 左上角对齐 + 撑开 SVG，便于横向/纵向滚动整图
  vx = pad - minX * sc;
  vy = pad - minY * sc;
  var svgW = bw * sc + pad * 2;
  var svgH = bh * sc + pad * 2;
  svg.setAttribute('width', String(Math.ceil(svgW)));
  svg.setAttribute('height', String(Math.ceil(svgH)));
  svg.style.width = Math.ceil(svgW) + 'px';
  svg.style.height = Math.ceil(svgH) + 'px';
  updateTransform();
}

/* ═══════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════ */
const tipEl = document.getElementById('tip');
let mx = 0, my = 0;
window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  tipEl.style.left = (mx + 16) + 'px';
  tipEl.style.top  = (my - 8) + 'px';
});

function showTip(node) {
  tipEl.innerHTML = `<b>${node.label}</b>${node.tip}`;
  tipEl.classList.add('show');
}
function hideTip() { tipEl.classList.remove('show'); }

function updateTransform() {
  const g = svg.getElementById('g-main');
  if (g) g.setAttribute('transform', 'translate(' + vx + ',' + vy + ') scale(' + sc + ')');
}

/* ═══════════════════════════════════════════
   INIT — 固定布局，窗口变化时重新适配放大
═══════════════════════════════════════════ */
renderTree();
window.addEventListener('resize', function () { renderTree(); });
</script>
</body>
</html>
